version: '3.8'

services:
  db:
    image: postgis/postgis:14-3.3
    container_name: arctic_carbon_db_new
    restart: always
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: web_demo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
